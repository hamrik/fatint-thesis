name: Lint C++ project
on:
  push:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        id: setup
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo apt-get install -y build-essential clang-tidy
      - name: Configure project
        id: configure
        run: |
          cd fatint-cpp
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - name: Lint project
        id: lint
        run: |
          cd fatint-cpp
          clang-tidy -p build src/*.cpp libs/*/{include,src}/*/*.{cpp,hpp}
