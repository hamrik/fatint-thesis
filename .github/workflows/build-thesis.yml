name: Build thesis
on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        id: setup
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo apt-get install -y wget xz-utils
          mkdir -p /opt/typst
          cd /opt/typst
          wget https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz
          tar -xf ./*.tar.xz
      - name: Compile thesis
        id: compile
        run: |
          cd thesis
          /opt/typst/typst-x86_64-unknown-linux-musl/typst compile main.typ
      - name: Export PDF
        id: export
        uses: actions/upload-artifact@v4
        with:
          name: thesis
          path: thesis/main.pdf
